type: custom:button-card
show_icon: false
show_state: false
show_name: false
styles:
  card:
    - border-radius: 22px
    - padding: 16px 16px 12px 16px
    - background: var(--card-background-color, #f4f4f5)
    - box-shadow: var(--ha-card-box-shadow, 0 2px 8px rgba(0, 0, 0, 0.06))
  grid:
    - grid-template-areas: |
        "title status status status"
        "fuelbar fuelbar batbar batbar"
        "fuelval fuelval batval batval"
        "fuellab fuellab batlab batlab"
        "tval vval outval inval"
        "tlab vlab outlab inlab"
        "controls controls controls controls"
    - grid-template-columns: repeat(4, 1fr)
    - row-gap: 6px
    - column-gap: 10px
  custom_fields:
    title:
      - justify-self: start
      - align-self: center
      - font-size: 24px
      - line-height: 1
      - font-weight: 500
      - color: var(--primary-text-color, #161616)
    status:
      - justify-self: end
      - align-self: center
    fuelval:
      - justify-self: start
      - color: var(--primary-text-color, #222)
    batval:
      - justify-self: start
      - color: var(--primary-text-color, #222)
    fuellab:
      - justify-self: start
      - color: var(--secondary-text-color, #8f9198)
      - font-size: 16px
    batlab:
      - justify-self: start
      - color: var(--secondary-text-color, #8f9198)
      - font-size: 16px
    tval:
      - color: var(--primary-text-color, #222)
    vval:
      - color: var(--primary-text-color, #222)
    outval:
      - color: var(--primary-text-color, #222)
    inval:
      - color: var(--primary-text-color, #222)
    tlab:
      - color: var(--secondary-text-color, #8f9198)
      - font-size: 14px
    vlab:
      - color: var(--secondary-text-color, #8f9198)
      - font-size: 14px
    outlab:
      - color: var(--secondary-text-color, #8f9198)
      - font-size: 14px
    inlab:
      - color: var(--secondary-text-color, #8f9198)
      - font-size: 14px
    controls:
      - margin-top: 10px
custom_fields:
  title: |
    [[[
      const odometer = states['sensor.evolute_odometer']?.state ?? '-';
      const name = states['sensor.evolute_car_model_name']?.state;
      const year = states['sensor.evolute_car_model_year']?.state;
      const model = name && name !== 'unknown' && name !== 'unavailable' ? name : 'Evolute';
      const yearSuffix = year && year !== 'unknown' && year !== 'unavailable' ? ` (${year})` : '';
      return `
        <div onclick="event.stopPropagation();this.dispatchEvent(new CustomEvent('hass-more-info',{detail:{entityId:'sensor.evolute_odometer'},bubbles:true,composed:true}));" style="display:flex;flex-direction:column;gap:4px;line-height:1.05;cursor:pointer;">
          <div style="display:flex;align-items:center;gap:8px;font-size:28px;font-weight:600;">
            <ha-icon icon="mdi:counter" style="--mdc-icon-size:24px;color:var(--state-icon-color,#3f8fc7);"></ha-icon>
            <span>${odometer} км</span>
          </div>
          <div style="font-size:14px;font-weight:400;color:var(--secondary-text-color,#8f9198);">${model}${yearSuffix}</div>
        </div>
      `;
    ]]]
  status: |
    [[[
      const online = states['binary_sensor.evolute_online']?.state === 'on';
      const bg = online ? '#5cbc63' : '#a8a8a8';
      const txt = online ? 'Доступен ✓' : 'Недоступен';
      return `<div style="display:inline-flex;align-items:center;gap:10px;"><span style="width:13px;height:13px;border-radius:50%;background:${bg};display:inline-block"></span><span style="background:${bg};color:#fff;font-size:20px;line-height:1;padding:5px 14px;border-radius:999px;">${txt}</span></div>`;
    ]]]
  fuelbar: |
    [[[
      const v = Math.max(0, Math.min(100, Number(states['sensor.evolute_fuel_percentage']?.state ?? 0)));
      return `<div style="display:flex;align-items:center;gap:10px;"><ha-icon icon="mdi:fuel" style="--mdc-icon-size:20px;color:#3f8fc7"></ha-icon><div style="height:6px;background:#d5d8de;flex:1;border-radius:6px;overflow:hidden;"><div style="height:100%;width:${v}%;background:#3f8fc7"></div></div></div>`;
    ]]]
  batbar: |
    [[[
      const v = Math.max(0, Math.min(100, Number(states['sensor.evolute_battery_percentage']?.state ?? 0)));
      return `<div style="display:flex;align-items:center;gap:10px;"><ha-icon icon="mdi:lightning-bolt" style="--mdc-icon-size:20px;color:#3f8fc7"></ha-icon><div style="height:6px;background:#d5d8de;flex:1;border-radius:6px;overflow:hidden;"><div style="height:100%;width:${v}%;background:#3f8fc7"></div></div></div>`;
    ]]]
  fuelval: |
    [[[
      const p = states['sensor.evolute_fuel_percentage']?.state ?? '-';
      const km = states['sensor.evolute_remains_mileage_fuel']?.state ?? states['sensor.evolute_raw_data']?.attributes?.remainsMileageFuel ?? '-';
      return `<div style="font-size:22px;font-weight:500;line-height:1.05;">${p}% / ${km}км</div>`;
    ]]]
  batval: |
    [[[
      const p = states['sensor.evolute_battery_percentage']?.state ?? '-';
      const km = states['sensor.evolute_remains_mileage_battery']?.state ?? states['sensor.evolute_raw_data']?.attributes?.remainsMileage ?? '-';
      return `<div style="font-size:22px;font-weight:500;line-height:1.05;">${p}% / ${km}км</div>`;
    ]]]
  fuellab: топливо
  batlab: батарея
  tval: |
    [[[
      const raw = states['sensor.evolute_coolant_temperature']?.state;
      const n = Number(raw);
      const formatted = Number.isFinite(n) ? n.toFixed(1) : '-';
      return `<div onclick="event.stopPropagation();this.dispatchEvent(new CustomEvent('hass-more-info',{detail:{entityId:'sensor.evolute_coolant_temperature'},bubbles:true,composed:true}));" style="font-size:20px;font-weight:500;line-height:1.05;cursor:pointer;">${formatted}°C</div>`;
    ]]]
  vval: |
    [[[
      const v = Number(states['sensor.evolute_12vbattery_voltage']?.state ?? 0);
      const formatted = Number.isFinite(v) && v > 0 ? v.toFixed(2) : '-';
      return `<div onclick="event.stopPropagation();this.dispatchEvent(new CustomEvent('hass-more-info',{detail:{entityId:'sensor.evolute_12vbattery_voltage'},bubbles:true,composed:true}));" style="font-size:20px;font-weight:500;line-height:1.05;cursor:pointer;">${formatted} В</div>`;
    ]]]
  outval: |
    [[[
      const raw = states['sensor.evolute_outside_temperature']?.state;
      const n = Number(raw);
      const formatted = Number.isFinite(n) ? n.toFixed(1) : '-';
      return `<div onclick="event.stopPropagation();this.dispatchEvent(new CustomEvent('hass-more-info',{detail:{entityId:'sensor.evolute_outside_temperature'},bubbles:true,composed:true}));" style="font-size:20px;font-weight:500;line-height:1.05;cursor:pointer;">${formatted}°C</div>`;
    ]]]
  inval: |
    [[[
      const raw = states['sensor.evolute_inboard_temperature']?.state;
      const n = Number(raw);
      const formatted = Number.isFinite(n) ? n.toFixed(1) : '-';
      return `<div onclick="event.stopPropagation();this.dispatchEvent(new CustomEvent('hass-more-info',{detail:{entityId:'sensor.evolute_inboard_temperature'},bubbles:true,composed:true}));" style="font-size:20px;font-weight:500;line-height:1.05;cursor:pointer;">${formatted}°C</div>`;
    ]]]
  tlab: |
    <div style="line-height:1.05">охлаждающая<br>жидкость</div>
  vlab: |
    <div style="line-height:1.05">напряжение<br>АКБ</div>
  outlab: улица
  inlab: салон
  controls:
    card:
      type: grid
      square: false
      columns: 4
      cards:
        - type: conditional
          conditions:
            - entity: binary_sensor.evolute_central_locking_engaged
              state: 'off'
          card:
            type: button
            name: Открыть
            icon: mdi:lock-open-variant
            tap_action:
              action: call-service
              service: script.evolute_lock_open
        - type: conditional
          conditions:
            - entity: binary_sensor.evolute_central_locking_engaged
              state: 'on'
          card:
            type: button
            name: Закрыть
            icon: mdi:lock
            tap_action:
              action: call-service
              service: script.evolute_lock_close
        - type: conditional
          conditions:
            - entity: binary_sensor.evolute_trunk_open
              state: 'on'
          card:
            type: button
            name: Закрыть багажник
            icon: mdi:car-back
            tap_action:
              action: call-service
              service: script.evolute_trunk_close
        - type: conditional
          conditions:
            - entity: binary_sensor.evolute_trunk_open
              state: 'off'
          card:
            type: button
            name: Открыть багажник
            icon: mdi:car-back
            tap_action:
              action: call-service
              service: script.evolute_trunk_open
        - type: button
          name: Blink and horn
          icon: mdi:car-emergency
          tap_action:
            action: call-service
            service: script.evolute_blink
        - type: button
          name: Подготовка
          icon: mdi:car-clock
          tap_action:
            action: call-service
            service: script.evolute_prepare_on
