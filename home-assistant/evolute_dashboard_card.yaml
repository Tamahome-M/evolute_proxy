type: vertical-stack
cards:
  - type: tile
    entity: binary_sensor.evolute_online
    name: Evolute i-Space
    icon: mdi:car-electric
    color: teal
    state_content:
      - state
      - last-changed
    features_position: bottom

  - type: glance
    title: Статус авто
    show_state: true
    show_icon: true
    columns: 4
    entities:
      - entity: binary_sensor.evolute_ready_status
        name: Ready
      - entity: binary_sensor.evolute_ignition_on
        name: Зажигание
      - entity: binary_sensor.evolute_central_locking_engaged
        name: Замки
      - entity: binary_sensor.evolute_trunk_open
        name: Багажник

  - type: grid
    title: Энергия и запас хода
    columns: 2
    square: false
    cards:
      - type: gauge
        entity: sensor.evolute_battery_percentage
        name: Батарея
        min: 0
        max: 100
        severity:
          green: 55
          yellow: 25
          red: 0
      - type: gauge
        entity: sensor.evolute_fuel_percentage
        name: Топливо
        min: 0
        max: 100
        severity:
          green: 45
          yellow: 20
          red: 0
      - type: tile
        entity: sensor.evolute_remains_mileage_battery
        name: Запас хода EV
      - type: tile
        entity: sensor.evolute_remains_mileage_fuel
        name: Запас хода ДВС

  - type: grid
    title: Климат
    columns: 3
    square: false
    cards:
      - type: tile
        entity: binary_sensor.evolute_climate_on
        name: Климат
      - type: tile
        entity: sensor.evolute_climate_current_temp
        name: В салоне
      - type: tile
        entity: sensor.evolute_outside_temp
        name: На улице


  - type: map
    title: Позиция автомобиля
    entities:
      - entity: sensor.evolute_car_location
    default_zoom: 14
    hours_to_show: 24

  - type: grid
    title: Быстрые команды
    columns: 3
    square: false
    cards:
      - type: button
        name: Открыть
        icon: mdi:lock-open-variant
        tap_action:
          action: call-service
          service: script.evolute_lock_open
      - type: button
        name: Закрыть
        icon: mdi:lock
        tap_action:
          action: call-service
          service: script.evolute_lock_close
      - type: button
        name: Мигнуть
        icon: mdi:car-emergency
        tap_action:
          action: call-service
          service: script.evolute_blink
      - type: button
        name: Багажник +
        icon: mdi:car-back
        tap_action:
          action: call-service
          service: script.evolute_trunk_open
      - type: button
        name: Обогрев
        icon: mdi:radiator
        tap_action:
          action: call-service
          service: script.evolute_heating_on
      - type: button
        name: Охлаждение
        icon: mdi:snowflake
        tap_action:
          action: call-service
          service: script.evolute_cooling_on
      - type: button
        name: Подготовка ON
        icon: mdi:car-clock
        tap_action:
          action: call-service
          service: script.evolute_prepare_on
      - type: button
        name: Подготовка OFF
        icon: mdi:car-clock
        tap_action:
          action: call-service
          service: script.evolute_prepare_off

  - type: entities
    title: Диагностика
    show_header_toggle: false
    entities:
      - entity: sensor.evolute_12vbattery_voltage
        name: 12V батарея
      - entity: sensor.evolute_odometer
        name: Пробег
      - entity: sensor.evolute_speed
        name: Скорость
      - entity: sensor.evolute_last_online_time
        name: Последний онлайн
      - entity: sensor.evolute_sensor_data_time
        name: Время данных
