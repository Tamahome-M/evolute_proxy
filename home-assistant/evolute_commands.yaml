# Remote commands for Evolute TBox intelligent actions (/tbox-i/<action_name>)
# Change IP to your add-on host address if needed.
evolute_lock_open:
  url: "http://192.168.1.254:12321/tbox-i/lock_open"
  method: POST
  headers:
    X-API-Key: "{{ states('input_text.evolute_proxy_token_rw') }}"

evolute_lock_close:
  url: "http://192.168.1.254:12321/tbox-i/lock_close"
